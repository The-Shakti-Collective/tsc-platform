name: runtime-validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: runtime-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"
  DATABASE_URL: postgresql://tsc:tsc@localhost:5432/tsc_ci

jobs:
  runtime-artifacts:
    name: runtime-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm monorepo
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build API dependency graph
        run: pnpm build

      - name: Verify workspace dist artifacts
        run: pnpm verify:dist

      - name: Create production deploy bundle
        run: pnpm deploy:api

      - name: Verify deploy bundle artifacts
        run: pnpm verify:deploy

      - name: Resolve @tsc/database from deploy bundle
        working-directory: deploy
        run: |
          node -e "const fs=require('fs'); const p=require.resolve('@tsc/database'); if(!fs.existsSync(p)) { console.error('missing', p); process.exit(1); } console.log('resolved', p);"
          node -e "const d=require('@tsc/database'); if(!d.slugifyWorkspace) { console.error('exports empty'); process.exit(1); } console.log('require ok');"

      - name: Smoke start API from deploy bundle (5s)
        working-directory: deploy
        env:
          PORT: "4099"
          TSC_AUTH_STUB: "true"
          REDIS_URL: redis://127.0.0.1:6379
        run: |
          timeout 8s node dist/main.js || code=$?
          if [ "${code:-0}" -eq 124 ] || [ "${code:-0}" -eq 137 ]; then
            echo "API booted (timeout expected without DB)"
            exit 0
          fi
          exit ${code:-0}
