<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#1e293b;border-radius:8px;border:1px solid #334155;overflow:hidden;">
          <tr>
            <td style="padding:24px 28px 16px;border-bottom:1px solid #334155;">
              <p style="margin:0;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#94a3b8;">CoreKnot Notification</p>
              <h1 style="margin:8px 0 0;font-size:22px;font-weight:700;color:#f8fafc;">{{title}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 28px;">
              <p style="margin:0 0 8px;font-size:13px;color:#94a3b8;">Hi {{recipientName}},</p>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#cbd5e1;">{{message}}</p>
              <span style="display:inline-block;padding:4px 12px;border-radius:4px;background:#334155;border:1px solid #475569;color:#2dd4bf;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">{{category}}</span>
              <p style="margin:20px 0 0;font-size:11px;color:#64748b;">{{timestamp}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 28px;">
              <a href="{{ctaLink}}" style="display:inline-block;padding:12px 24px;background:#126d5e;color:#ffffff;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;">View in CoreKnot</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
