<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Session Reminder</title>
</head>
<body style="margin:0;padding:0;background-color:#0f172a;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#0f172a;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width:600px;background-color:#1e293b;border:1px solid #334155;border-radius:8px;padding:32px 28px;">
          <tr>
            <td align="center" style="padding-bottom:24px;border-bottom:1px solid #334155;">
              <h2 style="font-size:20px;font-weight:700;color:#2dd4bf;margin:0 0 4px 0;">The Shakti Collective</h2>
              <p style="font-size:12px;color:#94a3b8;margin:0;text-transform:uppercase;letter-spacing:0.1em;">Session Reminder</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 0;font-size:15px;line-height:1.6;color:#cbd5e1;">
              <p style="margin:0 0 16px 0;">Hello {{name}},</p>
              <p style="margin:0 0 24px 0;">This is a friendly reminder for your upcoming scheduled collective session. Please find the alignment details below:</p>
              <div style="background-color:#334155;border:1px solid #475569;border-left:3px solid #10b981;padding:16px 20px;border-radius:6px;margin-bottom:24px;">
                <p style="margin:0 0 4px 0;font-size:16px;font-weight:600;color:#f8fafc;">Acoustic Alignment Session</p>
                <p style="margin:0 0 2px 0;font-size:13px;color:#cbd5e1;"><strong>Date:</strong> Tomorrow</p>
                <p style="margin:0;font-size:13px;color:#cbd5e1;"><strong>Time:</strong> 4:00 PM IST</p>
              </div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="{{cta_url}}" style="display:inline-block;background:#126d5e;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;padding:12px 28px;border-radius:6px;">Confirm Attendance</a>
            </td>
          </tr>
          <tr>
            <td align="center" style="border-top:1px solid #334155;padding-top:20px;font-size:11px;color:#64748b;">
              <p style="margin:0;">The Shakti Collective • <a href="{{unsubscribe_url}}" style="color:#2dd4bf;text-decoration:none;">Unsubscribe</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
