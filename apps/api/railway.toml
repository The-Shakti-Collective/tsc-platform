# TSC API — Railway reference (canonical config: /railway.json + /nixpacks.toml at monorepo root)
#
# Railway dashboard → Service → Settings:
#   Root Directory:  (empty / repository root) — NOT apps/api
#   Config file:     railway.json at repo root (absolute path /railway.json if prompted)
#
# Install/build/start are defined in /nixpacks.toml to force pnpm (not npm).

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm db:generate && pnpm build && pnpm verify:dist && RAILWAY_DEPLOY_DIR=/app/deploy node scripts/create-deploy-bundle.mjs"

[deploy]
startCommand = "node scripts/railway-start.mjs"
healthcheckPath = "/api/health/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
