[phases.setup]
nixPkgs = ["nodejs_20","pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm db:generate",
  "pnpm build",
  "pnpm verify:dist",
  "RAILWAY_DEPLOY_DIR=/app/deploy node scripts/create-deploy-bundle.mjs",
]

[start]
cmd = "node scripts/railway-start.mjs"
