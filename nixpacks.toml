[phases.setup]
nixPkgs = ["nodejs_20","pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm db:generate",
  "pnpm build",
  "pnpm verify:dist",
  "pnpm --filter @tsc/api --prod deploy /app/deploy",
  "node scripts/verify-deploy-bundle.mjs",
]

[start]
cmd = "node scripts/railway-start.mjs"
