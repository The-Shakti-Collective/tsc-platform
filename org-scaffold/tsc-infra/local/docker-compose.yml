# Copy monorepo docker-compose.yml here during migration.
# Provides Postgres 16 + Redis for local API development.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tsc
      POSTGRES_PASSWORD: tsc
      POSTGRES_DB: tsc_dev
    ports:
      - "5432:5432"
    volumes:
      - tsc_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  tsc_pg_data:
