# LEGACY — CoreKnot Render Blueprint (archived 2026-06-15)
# Deploy authority: Railway — see apps/coreknot/server/railway.toml
# Do NOT use for new deploys. Rollback: copy back to apps/coreknot/render.yaml
# Docs: docs/DEPLOYMENT.md · docs/elimination/DEPLOYMENT-CERTIFICATE.md

services:
  - type: web
    name: coreknot-api-staging
    runtime: node
    rootDir: apps/coreknot/server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKERS
        value: false
      - key: PORT
        value: 10000
      - key: COREKNOT_POSTGRES_ENABLED
        value: true
      - key: COREKNOT_AUTH_STORE
        value: postgres
      - key: COREKNOT_TENANT_STORE
        value: postgres
      - key: COREKNOT_PROJECTS_STORE
        value: postgres
      - key: COREKNOT_TASKS_STORE
        value: postgres
      - key: COREKNOT_CRM_STORE
        value: postgres
      - key: COREKNOT_ARTISTS_STORE
        value: postgres
      - key: COREKNOT_DISABLE_GRIDFS_BACKUP
        value: true
      - key: BACKUP_DESTINATION
        value: neon
      - key: SUPABASE_SECONDARY_ENABLED
        value: false

  - type: worker
    name: coreknot-worker-staging
    runtime: node
    rootDir: apps/coreknot/server
    buildCommand: npm install
    startCommand: node workers/startWorkers.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKERS
        value: true

cronJobs:
  - name: coreknot-keep-warm
    schedule: "*/14 * * * *"
    runtime: node
    rootDir: apps/coreknot/server
    buildCommand: npm install
    startCommand: node scripts/keepWarm.js
    envVars:
      - key: KEEP_WARM_URL
        value: https://YOUR-RENDER-SERVICE.onrender.com/api/health
